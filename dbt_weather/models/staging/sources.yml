version: 2

sources:
  - name: raw
    database: WEATHER_DB
    schema: RAW
    tables:
      - name: raw_weather
        description: "Raw hourly weather data ingested from Open-Meteo API"
        config:
          loaded_at_field: loaded_at
          freshness:
            warn_after: {count: 2, period: hour}
            error_after: {count: 24, period: hour}